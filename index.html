<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>meals</title>
  <link rel="icon" href="/public/pavicon.svg" type="image/svg+xml">

  <!-- Primary Meta -->
  <meta name="description" content="오늘의 급식 메뉴를 한눈에 확인하세요." />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://meals-web.netlify.app/" />
  <meta property="og:title" content="meals | 오늘의 급식" />
  <meta property="og:description" content="오늘의 급식 메뉴를 한눈에 확인하세요." />
  <meta property="og:image" content="https://meals-web.netlify.app/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="ko_KR" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="meals" />
  <meta name="twitter:description" content="오늘의 급식 메뉴를 한눈에 확인하세요." />
  <meta name="twitter:image" content="https://meals-web.netlify.app/og-image.png" />

  <script type="module" src="src/main.js"></script>
</head>
<body>

  <header>
    <div class="header-inner">
      <h1 class="logo">
        <span class="logo-dot"></span>
        meals
      </h1>
      <button class="theme-btn" id="themeBtn" aria-label="다크 모드로 전환"></button>
    </div>
  </header>

  <main>
    <div class="date-nav" id="dateNav">
      <div class="date-nav-row">
        <button class="nav-btn" id="prevBtn" aria-label="이전 날짜">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <button class="date-display-btn" id="dateDisplayBtn" aria-haspopup="dialog">
          <span class="date-text" id="dateText">0000. 00. 00</span><script>(function(){var d=new Date(),w=['일','월','화','수','목','금','토'];document.getElementById('dateText').textContent=d.getFullYear()+'년 '+(d.getMonth()+1)+'월 '+d.getDate()+'일 '+w[d.getDay()]+'요일'})()</script>
          <span class="cal-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
          </span>
        </button>
        <button class="nav-btn" id="nextBtn" aria-label="다음 날짜">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </button>
      </div>
      <div class="today-btn-wrap">
        <button class="today-btn" id="todayBtn" style="display:none">오늘로 이동</button>
      </div>
    </div>

    <div class="meal-grid" id="mealGrid"></div>
  </main>

  <footer>
    <p>© 2026 meals. All rights reserved.</p>
    <a class="footer-github" id="footerGithub" href="https://github.com/kusuri12-10/meals" target="_blank" rel="noopener noreferrer" aria-label="GitHub"></a>
  </footer>
</body>
</html>
