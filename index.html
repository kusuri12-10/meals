<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>meals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="index.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <h1 class="logo">
        <span class="logo-dot"></span>
        meals
      </h1>
      <button class="theme-btn" id="themeBtn" aria-label="라이트 모드로 전환"></button>
    </div>
  </header>

  <main>
    <div class="date-nav" id="dateNav">
      <div class="date-nav-row">
        <button class="nav-btn" id="prevBtn" aria-label="이전 날짜">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <button class="date-display-btn" id="dateDisplayBtn" aria-haspopup="dialog">
          <span class="date-text" id="dateText"></span>
          <span class="cal-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
          </span>
        </button>
        <button class="nav-btn" id="nextBtn" aria-label="다음 날짜">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </button>
      </div>
      <div class="today-btn-wrap">
        <button class="today-btn" id="todayBtn" style="display:none">오늘로 이동</button>
      </div>
    </div>

    <div class="meal-grid" id="mealGrid"></div>
  </main>

  <footer>
    <p>© 2026 meals. All rights reserved.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
