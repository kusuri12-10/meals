name: School Meal Notification

on:
  schedule:
    - cron: '11 21 * * *'
    - cron: '11 2 * * *'
    - cron: '11 7 * * *'
    - cron: '11 14 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.ALARM_WEBHOOK }}
        run: python alarm.py
